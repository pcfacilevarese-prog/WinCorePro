<script>
    // 1. Effetto Counter Social Proof (Dinamico)
    document.addEventListener("DOMContentLoaded", () => {
        const obs = new IntersectionObserver((entries) => {
            if(entries[0].isIntersecting) {
                document.querySelectorAll('.sp-num').forEach(num => {
                    const target = parseInt(num.innerText.replace('+', ''));
                    let count = 0;
                    const interval = setInterval(() => {
                        count += Math.ceil(target / 20);
                        if (count >= target) {
                            num.innerText = target + "+";
                            clearInterval(interval);
                        } else {
                            num.innerText = count;
                        }
                    }, 60);
                });
                obs.disconnect();
            }
        });
        const sp = document.querySelector('.social-proof');
        if(sp) obs.observe(sp);
    });

    // 2. Menu Hamburger
    function toggleMenu(){
        const links=document.querySelector('.nav-links');
        const btn=document.getElementById('hamburger');
        const open=links.classList.toggle('open');
        btn.classList.toggle('open',open);
        btn.setAttribute('aria-expanded',open);
    }

    // 3. Logica Lingue e UI
    function setLang(l){
        document.querySelectorAll('[data-'+l+']').forEach(el=>{
            if(el.getAttribute('data-'+l)) el.innerHTML=el.getAttribute('data-'+l);
        });
    }

    function tog(el){
        const f=el.parentElement;
        const was=f.classList.contains('open');
        document.querySelectorAll('.faq.open').forEach(x=>x.classList.remove('open'));
        if(!was) f.classList.add('open');
    }
</script>
